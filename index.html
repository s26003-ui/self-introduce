  <body>
    <h1>자기소개</h1>

    <p>안녕하세요.</p>

    <h2>나에 대해</h2>
    <p>저는 새로운 것을 배우는 것을 좋아합니다.</p>
    <p>학교에서 친구들과 이야기하는 것도 좋아합니다.</p>

    <h2>취미</h2>
    <ul>
      <li>음악듣기</li>
      <li>먹방보기</li>
      <li>친구들이랑 놀기</li>
    </ul>

    <h2>좋아하는 것</h2>
    <ol>
      <li>딸기탕후루</li>
      <li>츄파춥스 딸기맛</li>
      <li>말차 설레임</li>
    </ol>

    <p>봐주셔서 감사합니다!</p>
  </body>
